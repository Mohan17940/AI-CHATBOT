<!DOCTYPE html>
<html >
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Bot</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:400px;
    max-width:95%;
    height:600px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;
    flex-direction:column;
}

.header{
    background:#2563eb;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f4f4f4;
}

.message{
    margin:10px 0;
    padding:10px 15px;
    border-radius:15px;
    width:fit-content;
    max-width:80%;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    color:#fff;
    margin-left:auto;
}

.bot{
    background:#ddd;
    color:#000;
}

.input-area{
    display:flex;
    border-top:1px solid #ccc;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    font-size:16px;
}

button{
    padding:15px 20px;
    border:none;
    background:#2563eb;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🤖 AI Chat Bot
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hello! 👋 Ask me anything.
        </div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Type your message..."
            onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

const chatBox=document.getElementById("chatBox");

function sendMessage(){

    const input=document.getElementById("userInput");
    const text=input.value.trim();

    if(text==="") return;

    addMessage(text,"user");

    input.value="";

    setTimeout(()=>{
        let reply=getReply(text);
        addMessage(reply,"bot");
    },700);

}

function addMessage(text,type){

    const div=document.createElement("div");

    div.className="message "+type;

    div.innerHTML=text;

    chatBox.appendChild(div);

    chatBox.scrollTop=chatBox.scrollHeight;

}

function getReply(msg){

    msg=msg.toLowerCase();

    if(msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Nice to meet you!";

    if(msg.includes("how are you"))
        return "I'm doing great! 😊";

    if(msg.includes("your name"))
        return "I'm an AI Chat Bot.";

    if(msg.includes("html"))
        return "HTML is used to create the structure of web pages.";

    if(msg.includes("css"))
        return "CSS is used to style web pages.";

    if(msg.includes("javascript") || msg.includes("js"))
        return "JavaScript makes websites interactive.";

    if(msg.includes("java"))
        return "Java is a powerful object-oriented programming language.";

    if(msg.includes("python"))
        return "Python is simple, powerful, and beginner-friendly.";

    if(msg.includes("bye"))
        return "Goodbye! 👋 Have a great day.";

    return "🤖 Sorry, I'm still a simple chatbot. Connect me to the Gemini or OpenAI API to make me truly intelligent!";
}

</script>

</body>
</html>
